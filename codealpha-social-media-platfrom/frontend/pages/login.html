<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – ConnectSphere</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div id="toast"></div>
<div class="auth-bg">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/logo.png" alt="ConnectSphere" style="width:60px;height:60px;border-radius:16px;object-fit:cover;box-shadow:0 8px 24px rgba(108,99,255,0.4)"/>
    </div>
    <div class="auth-title">ConnectSphere</div>
    <p class="auth-subtitle">Welcome back — sign in to your account</p>

    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div style="position:relative">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" style="width:100%;padding-right:2.75rem"/>
        <button type="button" onclick="togglePw('password','eyeLogin')" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);padding:0;display:flex;align-items:center" id="eyeLogin">
          <svg id="eyeLogin-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eyeLogin-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>
    <p class="error-msg" id="err"></p>

    <button class="btn btn-primary btn-block" id="loginBtn" style="margin-top:0.75rem;padding:.85rem">
      Sign In
    </button>

    <div style="display:flex;align-items:center;gap:1rem;margin:1.5rem 0">
      <div style="flex:1;height:1px;background:var(--border)"></div>
      <span style="color:var(--text3);font-size:.82rem">or</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>
    </div>

    <p style="text-align:center;font-size:.9rem;color:var(--text2)">
      Don't have an account?
      <span class="link" onclick="window.location.href='/pages/register.html'">Create one</span>
    </p>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  function togglePw(inputId, btnId) {
    const input = document.getElementById(inputId);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    document.getElementById(btnId + '-open').style.display   = isHidden ? 'none'  : '';
    document.getElementById(btnId + '-closed').style.display = isHidden ? ''      : 'none';
  }

  if (getToken()) window.location.href = '/pages/feed.html';

  const loginBtn = document.getElementById('loginBtn');

  loginBtn.addEventListener('click', async () => {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const err      = document.getElementById('err');
    err.textContent = '';

    if (!email || !password) { err.textContent = 'Please fill in all fields.'; return; }

    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in…';
    try {
      const data = await Auth.login({ email, password });
      setToken(data.token);
      setUser(data.user);
      window.location.href = '/pages/feed.html';
    } catch (e) {
      err.textContent = e.message;
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign In';
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') loginBtn.click();
  });
</script>
</body>
</html>
